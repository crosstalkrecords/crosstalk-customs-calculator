<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crosstalk Customs Calculator</title>

<style>

body{
margin:0;
padding:0;
background:transparent;
font-family:inherit;
}

/* labels */

label{
display:block;
margin-top:16px;
margin-bottom:6px;
font-weight:700;
font-size:12px;
}

/* inputs inherit styling from parent form */

select,input{
width:100%;
box-sizing:border-box;
}

/* price */

.price{
margin-top:10px;
font-weight:700;
font-size:13px;
}

</style>
</head>

<body>

<label>Record Size</label>
<select id="size">
<option value="">Select</option>
<option value="7">7 inch</option>
<option value="10">10 inch</option>
<option value="12">12 inch</option>
</select>

<label>Sides</label>
<select id="sides">
<option value="1">Single-sided</option>
<option value="2">Double-sided</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1" max="5">

<div class="price">
Estimated Cost: <span id="price">$0</span>
</div>

<script>

/* pricing table */

const pricing={
7:{1:75,2:85},
10:{1:90,2:100},
12:{1:110,2:125}
};

function update(){

const size=document.getElementById("size").value;
const sides=document.getElementById("sides").value;

let qty=parseInt(document.getElementById("qty").value)||1;

if(qty>5){
qty=5;
document.getElementById("qty").value=5;
}

if(qty<1){
qty=1;
document.getElementById("qty").value=1;
}

let unit=0;

if(pricing[size] && pricing[size][sides]){
unit=pricing[size][sides];
}

const total=unit*qty;

document.getElementById("price").textContent="$"+total;

sendHeight();

}

/* attach listeners */

document.getElementById("size").addEventListener("change",update);
document.getElementById("sides").addEventListener("change",update);
document.getElementById("qty").addEventListener("input",update);

window.addEventListener("load",update);

/* iframe auto resize */

function sendHeight(){

const height=document.body.scrollHeight;

window.parent.postMessage({
type:"resizeCalculator",
height:height
},"*");

}

</script>

</body>
</html>
