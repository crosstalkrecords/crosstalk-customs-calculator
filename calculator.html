<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crosstalk Calculator Engine</title>

<style>
body{
margin:0;
padding:0;
background:transparent;
font-family:inherit;
font-size:14px;
color:inherit;
}
</style>

</head>

<body>

<script>

/* ------------------------------
   PRICING TABLE
------------------------------ */

const pricing = {
'7 inch': { 'Single-sided':75, 'Double-sided':85 },
'10 inch': { 'Single-sided':90, 'Double-sided':100 },
'12 inch': { 'Single-sided':110, 'Double-sided':125 }
};


/* ------------------------------
   LISTEN FOR CONFIG FROM PAGE
------------------------------ */

window.addEventListener("message", function(event){

if(!event.data) return;
if(event.data.type !== "calc") return;

let size = event.data.size;
let sides = event.data.sides;
let qty = parseInt(event.data.qty) || 1;

/* quantity guard */

if(qty > 5) qty = 5;
if(qty < 1) qty = 1;

/* lookup price */

let unit = 0;

if(pricing[size] && pricing[size][sides]){
unit = pricing[size][sides];
}

let total = unit * qty;


/* send result back to parent page */

window.parent.postMessage({
type: "crosstalkPrice",
price: total,
size: size,
sides: sides,
qty: qty
},"*");

});


/* ------------------------------
   OPTIONAL HEIGHT SYNC
------------------------------ */

function sendHeight(){

const height = document.body.scrollHeight;

window.parent.postMessage({
type: "resizeCalculator",
height: height
},"*");

}

window.addEventListener("load", sendHeight);

</script>

</body>
</html>
