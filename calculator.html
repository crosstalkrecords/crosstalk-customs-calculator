<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crosstalk Customs</title>

<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f4f4f4;
margin:0;
padding:40px;
display:flex;
justify-content:center;
}

.card{
background:white;
border-radius:24px;
box-shadow:0 40px 120px rgba(0,0,0,0.12);
padding:36px;
max-width:520px;
width:100%;
}

h2{
margin:0 0 20px 0;
}

label{
display:block;
font-size:12px;
font-weight:700;
margin-top:16px;
margin-bottom:6px;
}

select,input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

.price{
margin-top:20px;
font-size:22px;
font-weight:700;
color:#c9302c;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:999px;
background:#c9302c;
color:white;
font-weight:700;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Start Your Custom Record</h2>

<label>Record Size</label>
<select id="size">
<option value="7">7 inch</option>
<option value="10">10 inch</option>
<option value="12">12 inch</option>
</select>

<label>Sides</label>
<select id="sides">
<option value="1">Single</option>
<option value="2">Double</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">

<div class="price" id="price">$75</div>

<form action="https://hook.eu1.make.com/9qnwohttdlpsvffpdrwp942ialmpybou" method="POST">

<input type="hidden" name="Record Size" id="formSize">
<input type="hidden" name="Sides" id="formSides">
<input type="hidden" name="Quantity" id="formQty">
<input type="hidden" name="Price" id="formPrice">

<label>Name</label>
<input type="text" name="Customer Name" required>

<label>Email</label>
<input type="email" name="Email" required>

<button type="submit">Submit Project</button>

</form>

</div>

<script>

const prices = {
"7": {1:75,2:85},
"10": {1:90,2:100},
"12": {1:110,2:125}
};

function update(){

const size=document.getElementById("size").value;
const sides=document.getElementById("sides").value;
const qty=document.getElementById("qty").value;

const price=prices[size][sides]*qty;

document.getElementById("price").textContent="$"+price;

document.getElementById("formSize").value=size+'"';
document.getElementById("formSides").value=sides==1?"Single":"Double";
document.getElementById("formQty").value=qty;
document.getElementById("formPrice").value=price;

}

document.getElementById("size").addEventListener("change",update);
document.getElementById("sides").addEventListener("change",update);
document.getElementById("qty").addEventListener("input",update);

update();

</script>

</body>
</html>
