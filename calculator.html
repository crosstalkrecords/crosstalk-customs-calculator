<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crosstalk Calculator</title>

<style>

/* remove page styling so parent form styles apply */

body{
margin:0;
padding:0;
background:transparent;
font-family:inherit;
}

/* only spacing rules */

label{
display:block;
margin-top:16px;
margin-bottom:6px;
font-weight:700;
font-size:12px;
}

select,input{
width:100%;
box-sizing:border-box;
}

.price{
margin-top:10px;
font-weight:700;
font-size:13px;
}

</style>
</head>

<body>

<label>Record Size</label>
<select id="size">
<option value="">Select</option>
<option>7 inch</option>
<option>10 inch</option>
<option>12 inch</option>
</select>

<label>Sides</label>
<select id="sides">
<option>Single-sided</option>
<option>Double-sided</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">

<div class="price">
Estimated Cost: <span id="price">$0</span>
</div>

<script>

const pricing={
"7 inch":{"Single-sided":75,"Double-sided":85},
"10 inch":{"Single-sided":90,"Double-sided":100},
"12 inch":{"Single-sided":110,"Double-sided":125}
};

function update(){

const size=document.getElementById("size").value;
const sides=document.getElementById("sides").value;
let qty=parseInt(document.getElementById("qty").value)||1;

if(qty>5){
qty=5;
document.getElementById("qty").value=5;
}

const unit=pricing[size]?.[sides]||0;
const total=unit*qty;

document.getElementById("price").textContent="$"+total;

}

document.addEventListener("change",update);
document.addEventListener("input",update);
window.addEventListener("load",update);

/* iframe auto resize */

function sendHeight(){
window.parent.postMessage({
type:"resizeCalculator",
height:document.body.scrollHeight
},"*");
}

window.addEventListener("load",sendHeight);
window.addEventListener("change",sendHeight);
window.addEventListener("input",sendHeight);

</script>

</body>
</html>
