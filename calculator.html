<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crosstalk Customs Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:'Inter',sans-serif;
font-size:14px;
color:#000;
background:transparent;
}

label{
display:block;
font-size:12px;
font-weight:700;
margin-top:16px;
margin-bottom:6px;
}

select,
input{
width:100%;
padding:9px 12px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
background:#fafafa;
box-sizing:border-box;
}

input[type="number"]{
margin-bottom:4px;
}

.price{
margin-top:12px;
margin-bottom:10px;
font-weight:700;
font-size:13px;
}

</style>
</head>


<body>

<label>Record Size</label>
<select id="size">
<option value="">Select</option>
<option value="7">7 inch</option>
<option value="10">10 inch</option>
<option value="12">12 inch</option>
</select>


<label>Sides</label>
<select id="sides">
<option value="1">Single-sided</option>
<option value="2">Double-sided</option>
</select>


<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">


<div class="price">
Estimated cutting cost: <span id="price">$0</span>
</div>


<p style="font-size:11px;opacity:.65;margin-top:4px;">
Estimate excludes shipping and final mastering review.
</p>



<script>

/* pricing table */

const pricing={
7:{1:75,2:85},
10:{1:90,2:100},
12:{1:110,2:125}
};


/* calculator */

function update(){

const size=document.getElementById("size").value;
const sides=document.getElementById("sides").value;

let qty=parseInt(document.getElementById("qty").value)||1;

if(qty<1){
qty=1;
document.getElementById("qty").value=1;
}

let unit=0;

if(pricing[size] && pricing[size][sides]){
unit=pricing[size][sides];
}

const total=unit*qty;

document.getElementById("price").textContent="$"+total;


/* send values to parent form */

sendToParent();

}


/* messaging */

function sendToParent(){

const size=document.getElementById("size").value;
const sides=document.getElementById("sides").value;
const qty=document.getElementById("qty").value;
const price=document.getElementById("price").textContent;

const data={
size:size,
sides:sides,
qty:qty,
price:price
};

console.log("CALCULATOR → PARENT:",data);

window.parent.postMessage(data,"*");

}

/* listeners */

document.getElementById("size").addEventListener("change",update);
document.getElementById("sides").addEventListener("change",update);
document.getElementById("qty").addEventListener("input",update);


/* initialise */

window.addEventListener("load",update);

</script>


</body>
</html>
