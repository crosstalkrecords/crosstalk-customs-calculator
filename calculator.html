<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crosstalk Customs Calculator</title>

<style>
body{
margin:0;
padding:0;
background:transparent;
font-family:inherit;
}

/* Labels match Crosstalk form */

label{
display:block;
font-size:12px;
font-weight:700;
margin-top:16px;
margin-bottom:6px;
}

/* Inputs match Crosstalk form */

select,input{
width:100%;
padding:10px 12px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
background:#fafafa;
box-sizing:border-box;
}

/* Quantity spacing fix */

input[type="number"]{
margin-bottom:4px;
}

/* Price line */

.price{
margin-top:10px;
font-weight:700;
font-size:13px;
}

/* Summary text */

.summary{
margin-top:6px;
font-size:12px;
opacity:.7;
line-height:1.5;
}
</style>
</head>

<body>

<label>Record Size</label>
<select id="size">
<option value="">Select</option>
<option>7 inch</option>
<option>10 inch</option>
<option>12 inch</option>
</select>

<label>Sides</label>
<select id="sides">
<option>Single-sided</option>
<option>Double-sided</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">

<div class="price">
Estimated Cost: <span id="price">$0</span>
</div>

<div class="summary" id="summary"></div>

<script>
const pricing={
'7 inch':{'Single-sided':75,'Double-sided':85},
'10 inch':{'Single-sided':90,'Double-sided':100},
'12 inch':{'Single-sided':110,'Double-sided':125}
};

function update(){

const size=document.getElementById("size").value;
const sides=document.getElementById("sides").value;
let qty=parseInt(document.getElementById("qty").value)||1;

if(qty>5){
qty=5;
document.getElementById("qty").value=5;
}

const unit=(pricing[size] && pricing[size][sides])||0;
const total=unit*qty;

document.getElementById("price").textContent="$"+total;

if(size && sides){
document.getElementById("summary").innerHTML=
"<strong>"+size+" • "+sides+"</strong><br>"+
"Quantity: "+qty+"<br>"+
"Unit price: $"+unit+"<br>"+
"<strong>Total: $"+total+"</strong>";
}else{
document.getElementById("summary").innerHTML="";
}

}

document.addEventListener("change",update);
document.addEventListener("input",update);
</script>

</body>
</html>
