<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <title>Crosstalk Customs Calculator</title> <style> body{ font-family:system-ui,-apple-system,Segoe UI,Roboto; margin:0; padding:30px; background:#fff; } label{ display:block; font-size:13px; font-weight:700; margin-top:14px; } select,input{ width:100%; padding:10px; margin-top:6px; border-radius:8px; border:1px solid #ddd; font-size:14px; } .price{ margin-top:18px; font-weight:800; font-size:16px; } .summary{ margin-top:12px; font-size:13px; line-height:1.6; color:#333; } </style> </head> <body>

<label>Record Size</label>
<select id="size">

<option value="">Select</option> <option>7 inch</option> <option>10 inch</option> <option>12 inch</option> </select>

<label>Sides</label>
<select id="sides">

<option>Single-sided</option> <option>Double-sided</option> </select>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">

<div class="price"> Estimated Cost: <span id="price">$0</span> </div> <div class="summary" id="summary"></div> <script> const pricing={ '7 inch':{'Single-sided':75,'Double-sided':85}, '10 inch':{'Single-sided':90,'Double-sided':100}, '12 inch':{'Single-sided':110,'Double-sided':125} }; function update(){ const size=document.getElementById("size").value; const sides=document.getElementById("sides").value; let qty=parseInt(document.getElementById("qty").value)||1; if(qty>5){ qty=5; document.getElementById("qty").value=5; } const unit=(pricing[size] && pricing[size][sides])||0; const total=unit*qty; document.getElementById("price").textContent="$"+total; if(size && sides){ document.getElementById("summary").innerHTML= "<strong>"+size+" • "+sides+"</strong><br>"+ "Quantity: "+qty+"<br>"+ "Unit price: $"+unit+"<br>"+ "<strong>Total: $"+total+"</strong>"; } } document.addEventListener("change",update); document.addEventListener("input",update); </script> </body> </html>
