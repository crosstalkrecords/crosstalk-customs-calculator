<script>

// ---------------- ARTIST CHECKBOX ----------------

const artistCheck = document.getElementById("artistCheck")
const artistBox = document.getElementById("artistBox")
const artistOrder = document.getElementById("artistOrder")

artistCheck.addEventListener("change", function(){

artistBox.style.display = this.checked ? "block" : "none"

artistOrder.value = this.checked ? "Yes" : "No"

if (typeof resizeParent === "function") {
resizeParent()
}

})


// ---------------- SHIPPING CHECKBOX ----------------

const shipCheck=document.getElementById("shipCheck")
const shippingFields=document.getElementById("shippingFields")

shipCheck.addEventListener("change",function(){

shippingFields.style.display=this.checked?"block":"none"

shippingFields.querySelectorAll("input,select").forEach(el=>{
el.required=this.checked
})

if (typeof resizeParent === "function") {
resizeParent()
}

})


// ---------------- POSTCODE → STATE HELPER ----------------

document.getElementById("postcode").addEventListener("input",function(){

const pc=this.value

if(pc.startsWith("2")) document.getElementById("state").value="NSW"
if(pc.startsWith("3")) document.getElementById("state").value="VIC"
if(pc.startsWith("4")) document.getElementById("state").value="QLD"
if(pc.startsWith("5")) document.getElementById("state").value="SA"
if(pc.startsWith("6")) document.getElementById("state").value="WA"
if(pc.startsWith("7")) document.getElementById("state").value="TAS"

})

</script>
